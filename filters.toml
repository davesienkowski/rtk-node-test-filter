# rtk filter for the Node.js built-in test runner (`node --test`).
#
# An all-passing TAP run is ~90% boilerplate (TAP header, `# Subtest:`, `ok N`,
# and indented duration_ms/type/---/... YAML). This collapses a passing run to
# its summary, while a failing run keeps the `not ok` line, the full failure
# diagnostics (error/expected/actual/stack/location), and the summary.
#
# Pure rtk-side regex => identical behavior on Linux, macOS, and Windows.
# See README.md for install + how to make it fire automatically.
#
# Schema: https://github.com/rtk-ai/rtk/blob/develop/src/filters/README.md
schema_version = 1

# >>> rtk-node-test-filter >>>  (managed block — the installer regenerates this region)
[filters.node]
description = "node --test: keep failures + summary, drop passing-test TAP boilerplate"
match_command = "^node\\b.*--test\\b"
strip_ansi = true
truncate_lines_at = 200
max_lines = 200
strip_lines_matching = [
  "^TAP version",
  "^\\s*# Subtest:",
  "^\\s*ok \\d",
  "^\\s*1\\.\\.\\d",
  "^\\s*---\\s*$",
  "^\\s*\\.\\.\\.\\s*$",
  "^\\s*duration_ms:",
  "^\\s*type: '(test|suite)'",
  "^\\s*$",
]

[[tests.node]]
name = "all-passing run collapses to the summary block"
input = "TAP version 13\n# Subtest: alpha\nok 1 - alpha\n  ---\n  duration_ms: 1.2\n  type: 'test'\n  ...\n1..1\n# tests 1\n# pass 1\n# fail 0"
expected = "# tests 1\n# pass 1\n# fail 0"

[[tests.node]]
name = "failing run keeps not-ok line, error diagnostics, and summary"
input = "# Subtest: beta\nnot ok 1 - beta\n  ---\n  duration_ms: 2.5\n  type: 'test'\n  error: 'expected 1 to equal 2'\n  code: 'ERR_ASSERTION'\n  ...\n1..1\n# tests 1\n# pass 0\n# fail 1"
expected = "not ok 1 - beta\n  error: 'expected 1 to equal 2'\n  code: 'ERR_ASSERTION'\n# tests 1\n# pass 0\n# fail 1"

[[tests.node]]
name = "nested passing subtests under a suite are stripped"
input = "# Subtest: suite\n    # Subtest: child\n    ok 1 - child\n      ---\n      duration_ms: 0.3\n      type: 'test'\n      ...\n    1..1\nok 1 - suite\n  ---\n  duration_ms: 0.9\n  type: 'suite'\n  ...\n# tests 1\n# pass 1\n# fail 0"
expected = "# tests 1\n# pass 1\n# fail 0"
# <<< rtk-node-test-filter <<<
